services:
  # ===== 后端 API 服务 =====
  - type: web
    name: wanderwise-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: FRONTEND_URL
        value: "*"

  # ===== PostgreSQL 数据库 =====
  - type: pserv
    name: wanderwise-db
    runtime: image
    plan: free
    image:
      imageName: postgres:16
    disk:
      name: pgdata
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
    envVars:
      - key: POSTGRES_USER
        value: wanderwise
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: wanderwise
